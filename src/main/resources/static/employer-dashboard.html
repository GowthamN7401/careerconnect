<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Employer Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">CareerConnect</div>
        <ul>
            <li><a href="employer-dashboard.html"><i class="fa-solid fa-briefcase"></i> Dashboard</a></li>
            <li><a href="#postJobSection"><i class="fa-solid fa-square-plus"></i> Post Job</a></li>
            <li><a href="login.html" id="logoutLink"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </nav>

    <section class="dashboard-panel">
        <div class="dashboard-header">
            <div>
                <h1 id="welcomeName">Employer Dashboard</h1>
                <p>Post jobs, manage openings, and review applicants.</p>
            </div>
        </div>

        <div id="postJobSection" class="section-card">
            <h2>Post a new job</h2>
            <form id="jobPostForm" class="job-form">
                <div class="form-row">
                    <div class="input-group">
                        <label>Job Title</label>
                        <input type="text" id="jobTitle" placeholder="Product Manager" required>
                    </div>
                    <div class="input-group">
                        <label>Company</label>
                        <input type="text" id="company" placeholder="Company Name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="City, State" required>
                    </div>
                    <div class="input-group">
                        <label>Salary</label>
                        <input type="text" id="salary" placeholder="₹6 LPA" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Department</label>
                        <input type="text" id="department" placeholder="Marketing, IT, HR" required>
                    </div>
                    <div class="input-group">
                        <label>Employment Type</label>
                        <select id="employmentType" required>
                            <option value="Full-Time">Full-Time</option>
                            <option value="Part-Time">Part-Time</option>
                            <option value="Internship">Internship</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Role Description</label>
                    <textarea id="description" rows="4" placeholder="Describe responsibilities, skills, and requirements." required></textarea>
                </div>

                <button type="submit" class="btn-primary">Post Job</button>
            </form>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2>Your posted jobs</h2>
                <span id="employerJobCount" class="label-small">0 open positions</span>
            </div>
            <div id="postedJobsList" class="card-grid"></div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
