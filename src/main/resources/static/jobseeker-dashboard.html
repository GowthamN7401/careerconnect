<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Job Seeker Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">CareerConnect</div>
        <ul>
            <li><a href="jobseeker-dashboard.html"><i class="fa-solid fa-home"></i> Dashboard</a></li>
            <li><a href="my-applications.html"><i class="fa-solid fa-file-lines"></i> My Applications</a></li>
            <li><a href="login.html" id="logoutLink"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </nav>

    <section class="dashboard-panel">
        <div class="dashboard-header">
            <div>
                <h1 id="welcomeName">Welcome!</h1>
                <p>Explore curated job openings and apply in seconds.</p>
            </div>
            <div class="dashboard-summary">
                <div class="summary-card">
                    <span class="summary-title">Open Positions</span>
                    <strong id="jobCount">0</strong>
                </div>
            </div>
        </div>

        <div class="search-section">
            <input id="jobSearch" type="text" placeholder="Search jobs by title, company, or location">
        </div>

        <div id="jobList" class="card-grid"></div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
