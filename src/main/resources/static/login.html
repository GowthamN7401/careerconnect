<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class="page-wrapper auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>CareerConnect</h1>
                <p class="subtitle">Welcome back! Login and continue your job journey.</p>
            </div>

            <form id="loginForm" class="auth-form" action="/users/login" method="post">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye eye" id="togglePassword"></i>
                </div>

                <div class="role-box">
                    <label>Login as</label>
                    <div class="roles">
                        <label><input type="radio" name="role" value="JOB_SEEKER" checked>Job Seeker</label>
                        <label><input type="radio" name="role" value="EMPLOYER">Employer</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="bottom-text">
                Don&rsquo;t have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
