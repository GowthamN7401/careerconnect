<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class="page-wrapper auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create your CareerConnect account</h1>
                <p class="subtitle">Register as a job seeker or employer to continue.</p>
            </div>

            <form id="registerForm" class="auth-form" action="/users/register" method="post" enctype="multipart/form-data">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" name="name" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye eye" id="togglePassword"></i>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                </div>

                <div class="role-box">
                    <label>Register as</label>
                    <div class="roles">
                        <label><input type="radio" name="role" value="JOB_SEEKER" checked>Job Seeker</label>
                        <label><input type="radio" name="role" value="EMPLOYER">Employer</label>
                    </div>
                    <p class="role-hint">Choose Job Seeker to apply for available openings, or Employer to post new roles.</p>
                </div>

                <div class="input-group" id="resumeInputRow">
                    <i class="fa-solid fa-file-arrow-up"></i>
                    <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
                </div>

                <button type="submit" class="btn-primary">Register</button>
            </form>

            <div class="bottom-text">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
